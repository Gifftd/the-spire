<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Map — DM Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0806;--surface:#13100a;--surface2:#1c1810;--surface3:#242018;--border:#2e2510;--border-light:#3e3418;
  --gold:#b8860b;--gold-light:#d4a820;--gold-faint:#6b4f08;--gold-dim:#4a3606;
  --ink:#e8dfc0;--ink-dim:#a09070;--ink-faint:#6a5a40;
  --red:#8b2020;--red-bg:#2a0f0d;--green:#2d6a3f;--green-bg:#0d1f12;--green-light:#4a9a60;
  --purple:#5a3e9b;--purple-bg:#18102a;--amber:#c87800;
  --pc-accent:#2e5a8a;--enemy-accent:#8a2e2e;
  --radius:4px;--topbar:48px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:'Crimson Text',Georgia,serif;display:flex;flex-direction:column}

/* ── Topbar ── */
.topbar{height:var(--topbar);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1rem;gap:0.6rem;flex-shrink:0;z-index:50;flex-wrap:wrap}
.topbar h1{font-family:'Cinzel',serif;font-size:0.95rem;letter-spacing:0.1em;color:var(--gold);flex:1;min-width:80px}
.btn{font-family:'Cinzel',serif;font-size:0.68rem;letter-spacing:0.08em;border:1px solid;border-radius:var(--radius);padding:4px 10px;cursor:pointer;transition:all 0.15s;white-space:nowrap;background:transparent}
.btn-gold{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light)}.btn-gold:hover{background:var(--gold);color:var(--bg)}
.btn-green{background:var(--green-bg);border-color:var(--green);color:#8e8}.btn-green:hover{background:var(--green);color:white}
.btn-red{background:var(--red-bg);border-color:var(--red);color:#e88}.btn-red:hover{background:var(--red);color:white}
.btn-purple{background:var(--purple-bg);border-color:var(--purple);color:#c0a0f0}.btn-purple:hover{background:var(--purple);color:white}
.btn-ghost{border-color:var(--border-light);color:var(--ink-dim)}.btn-ghost:hover{border-color:var(--ink-dim);color:var(--ink)}
.btn-sm{font-size:0.6rem;padding:3px 7px}
.sync-status{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.08em;color:var(--ink-faint)}
.sync-status.ok{color:var(--green-light)}.sync-status.fail{color:var(--red)}.sync-status.ing{color:var(--amber)}

/* ── Layout ── */
.main{flex:1;display:grid;grid-template-columns:1fr 320px;overflow:hidden}
.map-col{position:relative;overflow:hidden;display:flex;flex-direction:column}
.editor-col{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}

/* ── Map ── */
.map-container{flex:1;position:relative;overflow:hidden;cursor:crosshair}
.map-canvas{position:absolute;top:0;left:0;transform-origin:0 0;user-select:none}
.map-img{display:block;max-width:none;pointer-events:none}
.map-placeholder{background:linear-gradient(135deg,#0d1a0d,#0a1a14,#0d1510);display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-style:italic;font-size:0.9rem;border:1px dashed var(--border);flex-direction:column;gap:8px}
.map-controls{position:absolute;bottom:1rem;right:1rem;display:flex;flex-direction:column;gap:4px;z-index:20}
.map-btn{width:30px;height:30px;background:rgba(19,16,10,0.9);border:1px solid var(--border-light);border-radius:var(--radius);color:var(--ink-dim);font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.map-btn:hover{border-color:var(--gold);color:var(--gold)}
.map-hint{position:absolute;top:0.5rem;left:50%;transform:translateX(-50%);background:rgba(19,16,10,0.9);border:1px solid var(--border-light);border-radius:var(--radius);padding:4px 10px;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.08em;color:var(--ink-faint);z-index:20;pointer-events:none}

/* ── Pins & zones (DM view) ── */
.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:10;transition:transform 0.15s}
.pin:hover{transform:translate(-50%,-100%) scale(1.15)}
.pin-icon{width:28px;height:36px;display:flex;flex-direction:column;align-items:center}
.pin-marker{width:22px;height:22px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid;display:flex;align-items:center;justify-content:center}
.pin-marker .pin-emoji{transform:rotate(45deg);font-size:10px;line-height:1}
.pin-tail{width:2px;height:10px;margin-top:1px}
.pin.type-city    .pin-marker{background:#1a2e4a;border-color:#4a80c0}.pin.type-city    .pin-tail{background:#4a80c0}
.pin.type-dungeon .pin-marker{background:#2a1a1a;border-color:#8a3030}.pin.type-dungeon .pin-tail{background:#8a3030}
.pin.type-wilderness .pin-marker{background:#1a2e1a;border-color:#4a8a50}.pin.type-wilderness .pin-tail{background:#4a8a50}
.pin.type-ruin    .pin-marker{background:#2a2010;border-color:#8a7040}.pin.type-ruin    .pin-tail{background:#8a7040}
.pin.type-port    .pin-marker{background:#102030;border-color:#4080a0}.pin.type-port    .pin-tail{background:#4080a0}
.pin.type-default .pin-marker{background:#201a10;border-color:#a08040}.pin.type-default .pin-tail{background:#a08040}
.pin.hidden-pin   .pin-marker{opacity:0.45;border-style:dashed}
.pin.selected-pin{filter:drop-shadow(0 0 6px var(--gold))}
.pin-label{position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%);white-space:nowrap;font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.06em;color:var(--ink);background:rgba(10,8,6,0.85);padding:2px 5px;border-radius:2px;border:1px solid var(--border);pointer-events:none}
.zone{position:absolute;border-radius:6px;border:2px solid;cursor:pointer;transition:opacity 0.2s}
.zone:hover{outline:2px solid var(--gold)}
.zone.selected-zone{outline:2px solid var(--gold)}
.zone-label{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.08em;text-align:center;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.8);padding:2px 6px;width:100%;display:flex;align-items:center;justify-content:center;height:100%}

/* ── SVG polygon overlay ── */
.map-svg-overlay{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
.poly-zone{cursor:pointer;pointer-events:all}
.poly-zone:hover .poly-fill{opacity:1}
.poly-zone.selected-poly .poly-fill{stroke:var(--gold)!important;stroke-width:2.5}
.poly-label-text{pointer-events:none;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.06em;text-shadow:0 1px 3px rgba(0,0,0,0.9)}

/* ── Polygon draw preview ── */
.poly-preview-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid #fff;transform:translate(-50%,-50%);pointer-events:none;z-index:30}
.poly-preview-dot.first-dot{width:14px;height:14px;border-color:var(--gold-light);box-shadow:0 0 6px var(--gold)}

/* ── Move mode ── */
.map-container.move-mode .pin{cursor:grab}
.map-container.move-mode .pin:active{cursor:grabbing}
.map-container.move-mode .zone{cursor:grab}
.map-container.move-mode .zone:active{cursor:grabbing}
.map-container.move-mode .poly-zone{cursor:grab}

/* ── Editor panel ── */
.editor-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.editor-tab{flex:1;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;padding:8px 4px;text-align:center;cursor:pointer;color:var(--ink-faint);border:none;background:transparent;border-bottom:2px solid transparent;transition:all 0.15s}
.editor-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.editor-tab:hover:not(.active){color:var(--ink-dim)}
.editor-pane{display:none;flex:1;overflow-y:auto;padding:0.8rem}
.editor-pane.active{display:block}

.field{margin-bottom:0.7rem}
.field label{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;color:var(--ink-faint);display:block;margin-bottom:3px}
.field input,.field textarea,.field select{width:100%;background:var(--bg);border:1px solid var(--border-light);border-radius:2px;color:var(--ink);font-family:'Crimson Text',serif;font-size:0.88rem;padding:4px 7px;outline:none;transition:border-color 0.15s}
.field input:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:60px}
.field select{cursor:pointer}
.field-row{display:flex;gap:6px}.field-row .field{flex:1}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:0.7rem}
.toggle-row label{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;color:var(--ink-dim);cursor:pointer}
.toggle-row input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px;cursor:pointer}

.section-header{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.12em;color:var(--gold-faint);margin:0.8rem 0 0.4rem;display:flex;align-items:center;justify-content:space-between}
.item-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:6px}
.item-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.item-card-title{font-family:'Cinzel',serif;font-size:0.75rem;color:var(--ink)}
.item-card-del{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:0.85rem;padding:0 2px}
.item-card-del:hover{color:var(--red)}

.loc-list{display:flex;flex-direction:column;gap:4px}
.loc-list-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:border-color 0.15s}
.loc-list-item:hover{border-color:var(--border-light)}
.loc-list-item.selected{border-color:var(--gold)}
.loc-list-name{font-family:'Cinzel',serif;font-size:0.78rem;color:var(--ink);flex:1}
.loc-list-type{font-size:0.65rem;color:var(--ink-faint)}
.hidden-tag{font-size:0.55rem;padding:1px 4px;border-radius:4px;border:1px solid #3a6060;color:#80c0c0;background:rgba(58,96,96,0.15);font-family:'Cinzel',serif}

.dm-note-area{background:#12102a;border:1px solid #3a2a6a;border-radius:var(--radius);padding:8px;margin-top:0.5rem}
.dm-note-label{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.1em;color:#7050c0;margin-bottom:4px}

.publish-section{padding:0.8rem;border-top:1px solid var(--border);flex-shrink:0}

/* ── Import modal ── */
.import-drop-zone {
  border: 2px dashed var(--border-light);
  border-radius: var(--radius);
  padding: 2rem 1rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 1rem;
}
.import-drop-zone:hover, .import-drop-zone.drag-over {
  border-color: var(--purple);
  background: var(--purple-bg);
}
.import-drop-zone-icon { font-size: 2rem; margin-bottom: 0.4rem; opacity: 0.6; }
.import-drop-label { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.08em; color: var(--ink-dim); }
.import-drop-sub { font-size: 0.78rem; color: var(--ink-faint); margin-top: 0.3rem; font-style: italic; }
.import-file-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 1rem; max-height: 120px; overflow-y: auto; }
.import-file-item { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 8px; font-size: 0.82rem; }
.import-file-item .fi-icon { font-size: 0.9rem; flex-shrink: 0; }
.import-file-item .fi-name { flex: 1; color: var(--ink-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.import-file-item .fi-type { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.08em; padding: 1px 5px; border-radius: 8px; flex-shrink: 0; }
.fi-type.location { background: rgba(74,128,192,0.15); color: #4a80c0; border: 1px solid rgba(74,128,192,0.3); }
.fi-type.npc      { background: rgba(138,112,64,0.15);  color: #8a7040; border: 1px solid rgba(138,112,64,0.3); }
.fi-type.unknown  { background: var(--surface); color: var(--ink-faint); border: 1px solid var(--border); }
.import-file-item .fi-del { background: none; border: none; color: var(--ink-faint); cursor: pointer; font-size: 0.8rem; padding: 0 2px; flex-shrink: 0; }
.import-file-item .fi-del:hover { color: var(--red); }

/* Import preview */
.import-preview { margin-bottom: 1rem; }
.import-preview-title { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--gold-faint); margin-bottom: 0.5rem; }
.import-loc-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 6px; }
.import-loc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.import-loc-name { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--ink); flex: 1; }
.import-loc-badge { font-family: 'Cinzel', serif; font-size: 0.58rem; padding: 1px 6px; border-radius: 8px; }
.import-loc-details { font-size: 0.78rem; color: var(--ink-faint); line-height: 1.4; }
.import-loc-details span { display: inline-block; margin-right: 10px; }
.conflict-badge { background: rgba(200,120,0,0.15); color: #c87800; border: 1px solid rgba(200,120,0,0.4); font-family: 'Cinzel', serif; font-size: 0.58rem; padding: 1px 6px; border-radius: 8px; }

/* Conflict resolution row */
.conflict-row { background: rgba(200,120,0,0.08); border: 1px solid rgba(200,120,0,0.3); border-radius: var(--radius); padding: 8px 10px; margin-bottom: 6px; }
.conflict-row-title { font-family: 'Cinzel', serif; font-size: 0.72rem; color: #c87800; margin-bottom: 6px; }
.conflict-opts { display: flex; gap: 6px; flex-wrap: wrap; }
.conflict-opt { font-family: 'Cinzel', serif; font-size: 0.62rem; padding: 4px 10px; border-radius: var(--radius); border: 1px solid; cursor: pointer; transition: all 0.15s; background: transparent; }
.conflict-opt.merge   { border-color: var(--green);  color: #8e8; }
.conflict-opt.merge.selected   { background: var(--green);  color: white; }
.conflict-opt.replace { border-color: var(--amber);  color: #c87800; }
.conflict-opt.replace.selected { background: var(--amber);  color: var(--bg); }
.conflict-opt.skip    { border-color: var(--border-light); color: var(--ink-faint); }
.conflict-opt.skip.selected    { background: var(--border-light); color: var(--ink); }

.import-summary { font-size: 0.82rem; color: var(--ink-dim); margin-bottom: 0.8rem; line-height: 1.5; }
.import-summary strong { color: var(--ink); }

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal-backdrop.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);max-width:480px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.8)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1rem;border-bottom:1px solid var(--border)}
.modal-header h2{font-family:'Cinzel',serif;font-size:0.85rem;letter-spacing:0.08em;color:var(--gold)}
.modal-close{background:none;border:none;color:var(--ink-faint);font-size:1.1rem;cursor:pointer;padding:2px 6px}
.modal-close:hover{color:var(--ink)}
.modal-body{padding:0.8rem 1rem;overflow-y:auto;flex:1}
.modal-footer{padding:0.7rem 1rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

@media(max-width:800px){
  .main{grid-template-columns:1fr}
  .editor-col{max-height:45vh;border-left:none;border-top:1px solid var(--border)}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <h1>⚔ World Map — DM Editor</h1>
  <button class="btn btn-ghost btn-sm" onclick="switchTab('locations')">Locations</button>
  <button class="btn btn-ghost btn-sm" onclick="switchTab('zones')">Zones</button>
  <button class="btn btn-ghost btn-sm" onclick="switchTab('world')">World</button>
  <button class="btn btn-ghost btn-sm" id="move-mode-btn" onclick="toggleMoveMode()">✥ Move mode</button>
  <button class="btn btn-purple btn-sm" onclick="openImport()">⬇ Import</button>
  <button class="btn btn-green" onclick="publishData()">▲ Publish to players</button>
  <button class="btn btn-ghost btn-sm" onclick="window.open('map.html','_blank')">Preview ↗</button>
  <div class="sync-status" id="sync-status">—</div>
</div>

<div class="main">
  <!-- MAP -->
  <div class="map-col">
    <div class="map-container" id="map-container">
      <div class="map-canvas" id="map-canvas"></div>
    </div>
    <div class="map-controls">
      <button class="map-btn" onclick="mapZoom(1.2)">+</button>
      <button class="map-btn" onclick="mapZoom(0.8)">−</button>
      <button class="map-btn" onclick="mapReset()">⌂</button>
    </div>
    <div class="map-hint" id="map-hint">Click map to place a new location pin</div>
  </div>

  <!-- EDITOR -->
  <div class="editor-col">
    <div class="editor-tabs">
      <button class="editor-tab active" id="tab-locations" onclick="switchTab('locations')">LOCATIONS</button>
      <button class="editor-tab" id="tab-zones" onclick="switchTab('zones')">ZONES</button>
      <button class="editor-tab" id="tab-world" onclick="switchTab('world')">WORLD</button>
    </div>

    <!-- LOCATIONS TAB -->
    <div class="editor-pane active" id="pane-locations">
      <div style="display:flex;gap:6px;margin-bottom:0.6rem;flex-wrap:wrap">
        <button class="btn btn-gold btn-sm" onclick="addLocation()">+ Add location</button>
        <button class="btn btn-ghost btn-sm" id="place-mode-btn" onclick="togglePlaceMode()">📍 Click to place</button>
      </div>
      <div class="loc-list" id="loc-list"></div>
    </div>

    <!-- ZONES TAB -->
    <div class="editor-pane" id="pane-zones">
      <div style="display:flex;gap:6px;margin-bottom:0.6rem;flex-wrap:wrap">
        <button class="btn btn-gold btn-sm" onclick="addZone()">+ Rectangle zone</button>
        <button class="btn btn-ghost btn-sm" id="poly-draw-btn" onclick="togglePolyDraw()">✏ Draw polygon</button>
      </div>
      <div id="zone-list"></div>
    </div>

    <!-- WORLD TAB -->
    <div class="editor-pane" id="pane-world">
      <div class="field"><label>WORLD NAME</label><input type="text" id="world-name" placeholder="The Realm…"></div>
      <div class="field"><label>REGION MAP IMAGE URL</label><input type="text" id="world-mapImage" placeholder="https://… or leave blank"></div>
      <div class="field-row">
        <div class="field"><label>MAP WIDTH (px)</label><input type="number" id="world-mapWidth" value="1200"></div>
        <div class="field"><label>MAP HEIGHT (px)</label><input type="number" id="world-mapHeight" value="800"></div>
      </div>
      <button class="btn btn-gold" onclick="saveWorldSettings()">Save world settings</button>
    </div>

    <div class="publish-section">
      <button class="btn btn-green" style="width:100%;margin-bottom:5px" onclick="publishData()">▲ Publish to players</button>
      <button class="btn btn-ghost" style="width:100%;font-size:0.62rem" onclick="saveToKV().then(()=>{setSyncStatus('ok','✦ DM data saved to cloud');setTimeout(()=>setSyncStatus('',''),3000)})">☁ Save DM data to cloud</button>
      <div style="margin-top:4px;text-align:center" id="publish-status" class="sync-status">Unpublished changes</div>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="modal-backdrop hidden" id="import-modal">
  <div class="modal" style="max-width:560px">
    <div class="modal-header">
      <h2>⬇ Import from Obsidian</h2>
      <button class="modal-close" onclick="closeImport()">✕</button>
    </div>
    <div class="modal-body">

      <!-- STEP 1: Drop files -->
      <div id="import-step-1">
        <div class="import-drop-zone" id="import-drop-zone"
             onclick="document.getElementById('import-file-input').click()"
             ondragover="event.preventDefault();this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="handleImportDrop(event)">
          <div class="import-drop-zone-icon">📂</div>
          <div class="import-drop-label">Drop .md files here or click to browse</div>
          <div class="import-drop-sub">Drop location files and NPC files together — they'll be linked automatically</div>
        </div>
        <input type="file" id="import-file-input" accept=".md" multiple style="display:none" onchange="handleImportFiles(this.files)">
        <div class="import-file-list" id="import-file-list"></div>
        <p class="import-summary" id="import-file-summary" style="display:none"></p>
      </div>

      <!-- STEP 2: Preview & conflicts -->
      <div id="import-step-2" style="display:none">
        <p class="import-summary" id="import-preview-summary"></p>
        <div class="import-preview" id="import-preview-list"></div>
      </div>

    </div>
    <div class="modal-footer" id="import-footer">
      <button class="btn btn-ghost" onclick="closeImport()">Cancel</button>
      <button class="btn btn-purple" id="import-next-btn" onclick="importStep2()" style="display:none">Preview import →</button>
      <button class="btn btn-gold" id="import-confirm-btn" onclick="confirmImport()" style="display:none">Import into map</button>
    </div>
  </div>
</div>

<!-- LOCATION EDITOR MODAL -->
<div class="modal-backdrop hidden" id="loc-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="loc-modal-title">Edit Location</h2>
      <button class="modal-close" onclick="closeLocModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="editor-tabs" style="margin:-0.8rem -1rem 0.8rem;border-radius:0">
        <button class="editor-tab active" id="ltab-info"   onclick="switchLocTab('info')">INFO</button>
        <button class="editor-tab" id="ltab-lore"   onclick="switchLocTab('lore')">LORE</button>
        <button class="editor-tab" id="ltab-npcs"   onclick="switchLocTab('npcs')">NPCs</button>
        <button class="editor-tab" id="ltab-quests" onclick="switchLocTab('quests')">QUESTS</button>
        <button class="editor-tab" id="ltab-dm"     onclick="switchLocTab('dm')">DM NOTES</button>
      </div>

      <!-- INFO -->
      <div class="editor-pane active" id="lpane-info">
        <div class="field"><label>LOCATION NAME</label><input type="text" id="loc-name" placeholder="Ironhaven…"></div>
        <div class="field-row">
          <div class="field"><label>TYPE</label>
            <select id="loc-type">
              <option value="city">City</option>
              <option value="dungeon">Dungeon</option>
              <option value="wilderness">Wilderness</option>
              <option value="ruin">Ruin</option>
              <option value="port">Port</option>
              <option value="default">Other</option>
            </select>
          </div>
          <div class="field"><label>ID (URL slug)</label><input type="text" id="loc-id" placeholder="ironhaven"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>X POS (%)</label><input type="number" id="loc-x" min="0" max="100" step="0.5"></div>
          <div class="field"><label>Y POS (%)</label><input type="number" id="loc-y" min="0" max="100" step="0.5"></div>
        </div>
        <div class="field"><label>SHORT DESCRIPTION (shown on hover)</label><textarea id="loc-shortDesc" rows="2"></textarea></div>
        <div class="field"><label>SUB-MAP IMAGE URL (optional)</label><input type="text" id="loc-mapImage" placeholder="https://… or leave blank"></div>
        <div class="field"><label>CONNECTED LOCATIONS (comma-separated IDs)</label><input type="text" id="loc-connected" placeholder="ironhaven,greypass"></div>
        <div class="toggle-row">
          <input type="checkbox" id="loc-visible" checked>
          <label for="loc-visible">Visible to players</label>
        </div>
      </div>

      <!-- LORE -->
      <div class="editor-pane" id="lpane-lore">
        <div class="field"><label>PLAYER-FACING LORE</label><textarea id="loc-lore" rows="12" placeholder="What the players know or can learn about this place…"></textarea></div>
      </div>

      <!-- NPCs -->
      <div class="editor-pane" id="lpane-npcs">
        <button class="btn btn-gold btn-sm" style="margin-bottom:0.6rem" onclick="addNPC()">+ Add NPC</button>
        <div id="npc-editor-list"></div>
      </div>

      <!-- QUESTS -->
      <div class="editor-pane" id="lpane-quests">
        <button class="btn btn-gold btn-sm" style="margin-bottom:0.6rem" onclick="addQuest()">+ Add quest hook</button>
        <div id="quest-editor-list"></div>
      </div>

      <!-- DM NOTES -->
      <div class="editor-pane" id="lpane-dm">
        <div class="dm-note-area">
          <div class="dm-note-label">🔒 DM ONLY — NOT PUBLISHED TO PLAYERS</div>
          <textarea id="loc-dmNotes" rows="12" style="width:100%;background:transparent;border:none;color:var(--ink);font-family:'Crimson Text',serif;font-size:0.9rem;outline:none;resize:vertical;line-height:1.5" placeholder="Secret notes, monster stats, plot hooks, treasure…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-red btn-sm" onclick="deleteLocation()">Delete</button>
      <button class="btn btn-ghost" onclick="closeLocModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveLocation()">Save location</button>
    </div>
  </div>
</div>

<script>//<![CDATA[
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const WORKER_URL = 'https://dnd-perk-webhook.jacobgiff.workers.dev/';

const TYPE_ICONS  = { city:'🏙',dungeon:'⚔',wilderness:'🌲',ruin:'🏚',port:'⚓',default:'📍' };
const TYPE_LABELS = { city:'City',dungeon:'Dungeon',wilderness:'Wilderness',ruin:'Ruin',port:'Port',default:'Location' };
const TYPE_COLORS = { city:'#4a80c0',dungeon:'#8a3030',wilderness:'#4a8a50',ruin:'#8a7040',port:'#4080a0',default:'#a08040' };
const ZONE_COLORS = ['#6a5a40','#2d6a3f','#2e4a7a','#8a3030','#5a3e9b','#4a6060'];

// ══════════════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════════════
let data = {
  world:{ name:'Velemere', mapImage:'./Velmere.jpeg', mapWidth:1456, mapHeight:816 },
  locations:[], zones:[]
};

let selectedLocId  = null;
let selectedZoneId = null;
let placeMode      = false;
let moveMode       = false;
let polyDrawMode   = false;
let polyPoints     = [];      // [{x,y}] percentage points being drawn
let editingLocId   = null;
let tempNPCs       = [];
let tempQuests     = [];

// ── Map pan/zoom ──────────────────────────────────────────────
let mapScale=1, mapX=0, mapY=0;
let isMapDragging=false, dragStartX, dragStartY, dragOriginX, dragOriginY;

// ── Move drag state ───────────────────────────────────────────
let moveDragTarget=null;   // { type:'pin'|'rectzone'|'polyzone', id, origX, origY, origPoints, mouseStartX, mouseStartY }

// ══════════════════════════════════════════════════════════════
//  PERSISTENCE — localStorage (fast cache) + KV (persistent backup)
// ══════════════════════════════════════════════════════════════
function saveLocal() {
  localStorage.setItem('dm_map_data', JSON.stringify(data));
}

function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem('dm_map_data') || 'null');
    if (d && d.locations) data = d;
  } catch {}
}

// Save full DM data (including notes) to KV via the Worker
async function saveToKV() {
  try {
    await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'map_data_dm', payload: data })
    });
  } catch {
    // Silently fail — localStorage is the fallback
  }
}

// Load full DM data from KV on startup
async function loadFromKV() {
  try {
    const res = await fetch(WORKER_URL + '?type=map_data_dm', { cache: 'no-store' });
    if (!res.ok) return false;
    const d = await res.json();
    if (d && d.locations && d.locations.length > 0) {
      data = d;
      return true;
    }
  } catch {}
  return false;
}

// Called after every edit — saves locally immediately, queues KV save
let kvSaveTimer = null;
function saveAll() {
  saveLocal();
  clearTimeout(kvSaveTimer);
  kvSaveTimer = setTimeout(saveToKV, 1500); // debounce KV writes
  setPublishStatus('', 'Unsaved changes');
}

// ══════════════════════════════════════════════════════════════
//  PUBLISH
// ══════════════════════════════════════════════════════════════
async function publishData() {
  setSyncStatus('ing','⟳ Publishing…');
  const playerData = {
    world: data.world,
    zones: data.zones,
    locations: data.locations.map(loc => { const { dmNotes, ...rest } = loc; return rest; })
  };
  try {
    const res = await fetch(WORKER_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type:'map_data', payload: playerData })
    });
    if (res.ok) { setSyncStatus('ok','✦ Published'); setPublishStatus('ok','✦ Published to players'); }
    else        { setSyncStatus('fail','⚠ Failed'); setPublishStatus('fail','⚠ Publish failed'); }
  } catch { setSyncStatus('fail','⚠ Offline'); setPublishStatus('fail','⚠ Could not reach server'); }
}
function setSyncStatus(type, msg) { const el=document.getElementById('sync-status'); el.className=`sync-status ${type}`; el.textContent=msg; }
function setPublishStatus(type, msg) { const el=document.getElementById('publish-status'); el.className=`sync-status ${type}`; el.textContent=msg; }

// ══════════════════════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════════════════════
function switchTab(name) {
  ['locations','zones','world'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t===name);
    document.getElementById(`pane-${t}`).classList.toggle('active', t===name);
  });
  // Leaving zones tab cancels polygon draw
  if (name !== 'zones' && polyDrawMode) cancelPolyDraw();
  placeMode = (name === 'locations') && !moveMode;
  updateModeUI();
}
function switchLocTab(name) {
  ['info','lore','npcs','quests','dm'].forEach(t => {
    document.getElementById(`ltab-${t}`).classList.toggle('active', t===name);
    document.getElementById(`lpane-${t}`).classList.toggle('active', t===name);
  });
}

// ══════════════════════════════════════════════════════════════
//  MAP BUILD & RENDER
// ══════════════════════════════════════════════════════════════
function buildMap() {
  const canvas = document.getElementById('map-canvas');
  // Preserve transform — only rebuild children
  const savedTransform = canvas.style.transform;
  canvas.innerHTML = '';
  const W = data.world.mapWidth  || 1200;
  const H = data.world.mapHeight || 800;

  // Background
  if (data.world.mapImage) {
    const img = document.createElement('img');
    img.className='map-img'; img.src=data.world.mapImage; img.width=W; img.height=H;
    canvas.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className='map-placeholder'; ph.style.cssText=`width:${W}px;height:${H}px`;
    ph.innerHTML=`<span>📍 Click anywhere to place a location</span><small style="color:var(--ink-faint);font-size:0.75rem">Set a map image in the World tab</small>`;
    canvas.appendChild(ph);
  }

  // ── SVG overlay for polygons ──────────────────────────────
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width', W); svg.setAttribute('height', H);
  svg.classList.add('map-svg-overlay');
  svg.style.cssText = `position:absolute;top:0;left:0;width:${W}px;height:${H}px`;

  (data.zones||[]).filter(z => z.shape === 'polygon').forEach(zone => {
    if (!zone.points || zone.points.length < 3) return;
    const pts = zone.points.map(p => `${p.x/100*W},${p.y/100*H}`).join(' ');
    const cx  = zone.points.reduce((s,p)=>s+p.x,0)/zone.points.length/100*W;
    const cy  = zone.points.reduce((s,p)=>s+p.y,0)/zone.points.length/100*H;

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.classList.add('poly-zone');
    if (zone.id === selectedZoneId) g.classList.add('selected-poly');

    const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points', pts);
    poly.classList.add('poly-fill');
    poly.setAttribute('fill', zone.color);
    poly.setAttribute('fill-opacity', zone.opacity);
    poly.setAttribute('stroke', zone.id===selectedZoneId ? 'var(--gold)' : zone.color);
    poly.setAttribute('stroke-width', zone.id===selectedZoneId ? '2.5' : '1.5');
    poly.setAttribute('stroke-opacity','0.7');

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', cx); label.setAttribute('y', cy);
    label.setAttribute('text-anchor','middle'); label.setAttribute('dominant-baseline','middle');
    label.classList.add('poly-label-text');
    label.setAttribute('fill', zone.color);
    label.textContent = zone.name;

    g.appendChild(poly); g.appendChild(label);
    g.addEventListener('click', e => { e.stopPropagation(); if (!moveDragTarget) selectZone(zone.id); });
    if (moveMode) attachPolyMoveDrag(g, zone);
    svg.appendChild(g);
  });

  canvas.appendChild(svg);

  // ── Rectangle zones ───────────────────────────────────────
  (data.zones||[]).filter(z => z.shape !== 'polygon').forEach(zone => {
    const el = document.createElement('div');
    el.className = `zone${zone.id===selectedZoneId?' selected-zone':''}`;
    el.style.cssText=`left:${zone.x}%;top:${zone.y}%;width:${zone.width}%;height:${zone.height}%;background:${zone.color};opacity:${zone.opacity};border-color:${zone.color};position:absolute`;
    const label = document.createElement('div');
    label.className='zone-label'; label.style.color=zone.color; label.style.opacity=1/zone.opacity*0.7;
    label.textContent=zone.name;
    el.appendChild(label);
    el.addEventListener('click', e => { e.stopPropagation(); if (!moveDragTarget) selectZone(zone.id); });
    if (moveMode) attachRectZoneMoveDrag(el, zone);
    canvas.appendChild(el);
  });

  // ── Pins ─────────────────────────────────────────────────
  (data.locations||[]).forEach(loc => {
    const type = loc.type||'default';
    const pin = document.createElement('div');
    pin.className = `pin type-${type}${loc.visible===false?' hidden-pin':''}${loc.id===selectedLocId?' selected-pin':''}`;
    pin.style.cssText=`left:${loc.x}%;top:${loc.y}%`;
    pin.innerHTML=`
      <div class="pin-icon">
        <div class="pin-marker"><span class="pin-emoji">${TYPE_ICONS[type]||TYPE_ICONS.default}</span></div>
        <div class="pin-tail"></div>
      </div>
      <div class="pin-label">${loc.name}${loc.visible===false?' 🙈':''}</div>
    `;
    if (moveMode) {
      attachPinMoveDrag(pin, loc);
    } else {
      pin.addEventListener('click', e => { e.stopPropagation(); selectLocation(loc.id); });
    }
    canvas.appendChild(pin);
  });

  // ── Polygon draw preview dots ─────────────────────────────
  if (polyDrawMode) renderPolyPreviewDots();

  canvas.removeEventListener('click', onMapClick);
  canvas.removeEventListener('mousemove', onMapMouseMove);
  canvas.addEventListener('click', onMapClick);
  canvas.addEventListener('mousemove', onMapMouseMove);

  if (savedTransform && savedTransform !== canvas.style.transform) {
    canvas.style.transform = savedTransform;
  }

  setupMapDrag();
}

// ── Polygon preview dots ──────────────────────────────────────
function renderPolyPreviewDots() {
  const canvas = document.getElementById('map-canvas');
  polyPoints.forEach((p, i) => {
    const dot = document.createElement('div');
    dot.className = `poly-preview-dot${i===0?' first-dot':''}`;
    dot.style.left = p.x + '%';
    dot.style.top  = p.y + '%';
    dot.style.position = 'absolute';
    dot.style.zIndex = '30';
    canvas.appendChild(dot);
  });
}

// ── SVG preview line while drawing ───────────────────────────
let polyMousePos = null;
function onMapMouseMove(e) {
  if (!polyDrawMode || polyPoints.length === 0) return;
  const canvas = document.getElementById('map-canvas');
  const rect = canvas.getBoundingClientRect();
  const W = data.world.mapWidth||1200, H = data.world.mapHeight||800;
  polyMousePos = {
    x: ((e.clientX - rect.left) / (W * mapScale)) * 100,
    y: ((e.clientY - rect.top)  / (H * mapScale)) * 100
  };
  renderPolyPreviewLine();
}

function renderPolyPreviewLine() {
  const existing = document.getElementById('poly-preview-svg');
  if (existing) existing.remove();
  if (!polyDrawMode || polyPoints.length < 1 || !polyMousePos) return;
  const canvas = document.getElementById('map-canvas');
  const W = data.world.mapWidth||1200, H = data.world.mapHeight||800;
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.id = 'poly-preview-svg';
  svg.style.cssText=`position:absolute;top:0;left:0;width:${W}px;height:${H}px;pointer-events:none;z-index:25`;
  const pts = [...polyPoints, polyMousePos].map(p=>`${p.x/100*W},${p.y/100*H}`).join(' ');
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  poly.setAttribute('points',pts);
  poly.setAttribute('fill','none');
  poly.setAttribute('stroke','var(--gold)');
  poly.setAttribute('stroke-width','1.5');
  poly.setAttribute('stroke-dasharray','6,4');
  poly.setAttribute('stroke-opacity','0.8');
  svg.appendChild(poly);
  canvas.appendChild(svg);
}

// ══════════════════════════════════════════════════════════════
//  MAP CLICK HANDLER (place mode + polygon draw)
// ══════════════════════════════════════════════════════════════
function onMapClick(e) {
  if (moveMode) return;
  if (moveDragTarget) { moveDragTarget = null; return; }

  const canvas = document.getElementById('map-canvas');
  const rect = canvas.getBoundingClientRect();
  const W = data.world.mapWidth||1200, H = data.world.mapHeight||800;
  const xPct = ((e.clientX - rect.left) / (W * mapScale)) * 100;
  const yPct = ((e.clientY - rect.top)  / (H * mapScale)) * 100;

  // ── Polygon draw ──────────────────────────────────────────
  if (polyDrawMode) {
    if (e.target.closest('.pin') || e.target.closest('.zone')) return;
    // Close polygon if click near first point
    if (polyPoints.length >= 3) {
      const first = polyPoints[0];
      const dx = xPct - first.x, dy = yPct - first.y;
      const distPx = Math.sqrt(dx*dx+dy*dy) / 100 * W * mapScale;
      if (distPx < 14) {
        finishPolygon();
        return;
      }
    }
    polyPoints.push({ x: Math.round(xPct*10)/10, y: Math.round(yPct*10)/10 });
    buildMap();
    renderPolyPreviewLine();
    return;
  }

  // ── Place pin ─────────────────────────────────────────────
  if (placeMode) {
    if (e.target.closest('.pin') || e.target.closest('.zone') || e.target.closest('.poly-zone')) return;
    openLocModal(null, Math.round(xPct*10)/10, Math.round(yPct*10)/10);
  }
}

function finishPolygon() {
  if (polyPoints.length < 3) { cancelPolyDraw(); return; }
  const id    = 'zone_' + Date.now();
  const color = ZONE_COLORS[data.zones.length % ZONE_COLORS.length];
  data.zones.push({ id, name:'New Region', shape:'polygon', points:[...polyPoints], color, opacity:0.18, visible:true });
  polyPoints = [];
  saveAll(); renderZoneList(); buildMap();
  setPublishStatus('','Unpublished changes');
  cancelPolyDraw();
  selectZone(id);
  switchTab('zones');
}

function cancelPolyDraw() {
  polyDrawMode = false;
  polyPoints   = [];
  polyMousePos = null;
  const el = document.getElementById('poly-preview-svg');
  if (el) el.remove();
  updateModeUI();
  buildMap();
}

// ══════════════════════════════════════════════════════════════
//  MAP PAN / ZOOM
// ══════════════════════════════════════════════════════════════
function resetMapView() {
  const container = document.getElementById('map-container');
  const W = data.world.mapWidth||1200, H = data.world.mapHeight||800;
  const cw = container.clientWidth||800, ch = container.clientHeight||600;
  mapScale = Math.min(cw/W, ch/H)*0.88;
  mapX = (cw - W*mapScale)/2; mapY = (ch - H*mapScale)/2;
  applyTransform();
}
function mapReset() { resetMapView(); }
function mapZoom(f) {
  const container = document.getElementById('map-container');
  const cx=container.clientWidth/2, cy=container.clientHeight/2;
  const ns = Math.min(Math.max(mapScale*f,0.15),4);
  mapX=cx-(cx-mapX)*(ns/mapScale); mapY=cy-(cy-mapY)*(ns/mapScale); mapScale=ns; applyTransform();
}
function applyTransform() {
  document.getElementById('map-canvas').style.transform=`translate(${mapX}px,${mapY}px) scale(${mapScale})`;
}

function setupMapDrag() {
  const container = document.getElementById('map-container');
  container.onmousedown = e => {
    if (moveMode) return;   // move mode uses its own drag handlers on pins/zones
    if (polyDrawMode) return;
    if (placeMode) return;
    if (e.target.closest('.pin')||e.target.closest('.zone')||e.target.closest('.poly-zone')) return;
    isMapDragging=true; dragStartX=e.clientX; dragStartY=e.clientY; dragOriginX=mapX; dragOriginY=mapY;
  };
  window.addEventListener('mousemove', e => {
    if (!isMapDragging) return;
    mapX=dragOriginX+(e.clientX-dragStartX); mapY=dragOriginY+(e.clientY-dragStartY); applyTransform();
  });
  window.addEventListener('mouseup', ()=>{ isMapDragging=false; });
  container.addEventListener('wheel', e => {
    e.preventDefault();
    const f=e.deltaY<0?1.1:0.9, rect=container.getBoundingClientRect();
    const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
    const ns=Math.min(Math.max(mapScale*f,0.15),4);
    mapX=cx-(cx-mapX)*(ns/mapScale); mapY=cy-(cy-mapY)*(ns/mapScale); mapScale=ns; applyTransform();
  },{passive:false});
}

// ══════════════════════════════════════════════════════════════
//  MOVE MODE — drag handlers
// ══════════════════════════════════════════════════════════════
function attachPinMoveDrag(pinEl, loc) {
  pinEl.style.cursor = 'grab';
  pinEl.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    moveDragTarget = { type:'pin', id:loc.id, origX:loc.x, origY:loc.y, mouseStartX:e.clientX, mouseStartY:e.clientY };
    pinEl.style.cursor = 'grabbing';
    pinEl.style.filter = 'drop-shadow(0 0 8px var(--gold))';
  });
}

function attachRectZoneMoveDrag(el, zone) {
  el.style.cursor = 'grab';
  el.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    moveDragTarget = { type:'rectzone', id:zone.id, origX:zone.x, origY:zone.y, mouseStartX:e.clientX, mouseStartY:e.clientY };
    el.style.cursor = 'grabbing';
  });
}

function attachPolyMoveDrag(gEl, zone) {
  gEl.style.cursor = 'grab';
  gEl.addEventListener('mousedown', e => {
    e.stopPropagation(); e.preventDefault();
    moveDragTarget = { type:'polyzone', id:zone.id, origPoints:zone.points.map(p=>({...p})), mouseStartX:e.clientX, mouseStartY:e.clientY };
    gEl.style.cursor = 'grabbing';
  });
}

// Global mousemove / mouseup for move drags
window.addEventListener('mousemove', e => {
  if (!moveDragTarget) return;
  const W = data.world.mapWidth||1200, H = data.world.mapHeight||800;
  // Convert pixel delta to percentage delta (accounting for zoom)
  const dxPct = ((e.clientX - moveDragTarget.mouseStartX) / (W * mapScale)) * 100;
  const dyPct = ((e.clientY - moveDragTarget.mouseStartY) / (H * mapScale)) * 100;

  const clamp = (v,min,max) => Math.max(min,Math.min(max,v));

  if (moveDragTarget.type === 'pin') {
    const loc = data.locations.find(l=>l.id===moveDragTarget.id);
    if (loc) {
      loc.x = clamp(Math.round((moveDragTarget.origX + dxPct)*10)/10, 0, 100);
      loc.y = clamp(Math.round((moveDragTarget.origY + dyPct)*10)/10, 0, 100);
      // Move the DOM pin directly for smooth feedback (no full rebuild during drag)
      const pinEl = document.querySelector(`.pin[style*="left:${moveDragTarget.origX}"]`) ||
                    document.querySelector(`.selected-pin`);
      const allPins = document.querySelectorAll('.pin');
      allPins.forEach(p => {
        if (p.dataset && p.dataset.locid === moveDragTarget.id) {
          p.style.left = loc.x + '%'; p.style.top = loc.y + '%';
        }
      });
      // Fast-path: update the specific pin by matching data attribute set below
      const targetPin = document.querySelector(`.pin[data-moveid="${moveDragTarget.id}"]`);
      if (targetPin) { targetPin.style.left = loc.x+'%'; targetPin.style.top = loc.y+'%'; }
    }
  } else if (moveDragTarget.type === 'rectzone') {
    const zone = data.zones.find(z=>z.id===moveDragTarget.id);
    if (zone) {
      zone.x = clamp(Math.round((moveDragTarget.origX + dxPct)*10)/10, 0, 100-zone.width);
      zone.y = clamp(Math.round((moveDragTarget.origY + dyPct)*10)/10, 0, 100-zone.height);
      const el = document.querySelector(`.zone[data-moveid="${moveDragTarget.id}"]`);
      if (el) { el.style.left = zone.x+'%'; el.style.top = zone.y+'%'; }
    }
  } else if (moveDragTarget.type === 'polyzone') {
    const zone = data.zones.find(z=>z.id===moveDragTarget.id);
    if (zone) {
      zone.points = moveDragTarget.origPoints.map(p => ({
        x: clamp(Math.round((p.x + dxPct)*10)/10, 0, 100),
        y: clamp(Math.round((p.y + dyPct)*10)/10, 0, 100)
      }));
      // Rebuild SVG for polygon (lightweight — only re-renders SVG overlay)
      rebuildPolySVG();
    }
  }
});

window.addEventListener('mouseup', e => {
  if (!moveDragTarget) return;
  saveAll();
  renderLocList();
  renderZoneList();
  buildMap();
  setPublishStatus('','Unpublished changes');
  moveDragTarget = null;
});

// Fast polygon SVG rebuild during drag (avoids full buildMap)
function rebuildPolySVG() {
  const canvas = document.getElementById('map-canvas');
  const existingSvg = canvas.querySelector('.map-svg-overlay');
  if (!existingSvg) return;
  const W = data.world.mapWidth||1200, H = data.world.mapHeight||800;
  (data.zones||[]).filter(z=>z.shape==='polygon').forEach(zone => {
    if (!zone.points||zone.points.length<3) return;
    const g = existingSvg.querySelector(`[data-polyzid="${zone.id}"]`);
    if (!g) return;
    const pts = zone.points.map(p=>`${p.x/100*W},${p.y/100*H}`).join(' ');
    const poly = g.querySelector('polygon');
    if (poly) poly.setAttribute('points',pts);
    const cx=zone.points.reduce((s,p)=>s+p.x,0)/zone.points.length/100*W;
    const cy=zone.points.reduce((s,p)=>s+p.y,0)/zone.points.length/100*H;
    const txt=g.querySelector('text');
    if (txt) { txt.setAttribute('x',cx); txt.setAttribute('y',cy); }
  });
}

function updateModeUI() {
  const container = document.getElementById('map-container');
  const moveBtn   = document.getElementById('move-mode-btn');
  const placeBtn  = document.getElementById('place-mode-btn');
  const polyBtn   = document.getElementById('poly-draw-btn');
  const hint      = document.getElementById('map-hint');

  // Move mode
  if (moveBtn) {
    moveBtn.style.background    = moveMode ? 'var(--amber)' : '';
    moveBtn.style.borderColor   = moveMode ? 'var(--amber)' : '';
    moveBtn.style.color         = moveMode ? '#000' : '';
  }

  // Place mode
  if (placeBtn) {
    placeBtn.style.background   = placeMode ? 'var(--gold-dim)' : '';
    placeBtn.style.borderColor  = placeMode ? 'var(--gold)' : '';
    placeBtn.style.color        = placeMode ? 'var(--gold-light)' : '';
  }

  if (polyBtn) {
    polyBtn.style.background    = polyDrawMode ? 'var(--green-bg)' : '';
    polyBtn.style.borderColor   = polyDrawMode ? 'var(--green)' : '';
    polyBtn.style.color         = polyDrawMode ? '#8e8' : '';

    hint.textContent = '✥ Move mode — drag pins and zones to reposition'; hint.style.display='block';
    container.style.cursor = 'default';

    const remaining = Math.max(0, 3 - polyPoints.length);
    hint.textContent = polyPoints.length===0
      ? '✏ Click to place polygon points — click near the first point to close'
      : polyPoints.length < 3

async function init() {
  // Show loading state
  setSyncStatus('ing', '⟳ Loading map data…');

  // Try KV first (most up-to-date, works across devices)
  const kvLoaded = await loadFromKV();

  if (!kvLoaded) {
    // Fall back to localStorage (same browser/device)
    loadLocal();
    setSyncStatus('', kvLoaded ? '' : '');
  } else {
    // KV loaded — sync localStorage to match
    saveLocal();
    setSyncStatus('ok', '✦ Loaded from cloud');
    setTimeout(() => setSyncStatus('', ''), 3000);
  }

  loadWorldFields();
  buildMap();
  renderLocList();
  renderZoneList();
  updateModeUI();
}

function handleImportFiles(fileList) {
  const mdFiles = Array.from(fileList).filter(f => f.name.endsWith('.md'));
  if (!mdFiles.length) return;

  const readers = mdFiles.map(file => new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => resolve({ name: file.name, content: e.target.result });
    reader.readAsText(file);
  }));

  Promise.all(readers).then(loaded => {
    loaded.forEach(f => {
      if (!importFiles.find(x => x.name === f.name)) {
        importFiles.push({ ...f, parsed: parseObsidianNote(f.name, f.content) });
      }
    });
    renderImportFileList();
  });
}

// ── YAML frontmatter parser ───────────────────────────────────
function parseFrontmatter(content) {
  const fm = {};
  const match = content.match(/^---\s*\n([\s\S]*?)\n---/);
  if (!match) return { fm, body: content.trim() };

  const yamlText = match[1];
  const body = content.slice(match[0].length).trim();

  yamlText.split('\n').forEach(line => {
    const colonIdx = line.indexOf(':');
    if (colonIdx < 0) return;
    const key = line.slice(0, colonIdx).trim();
    let val = line.slice(colonIdx + 1).trim();

    // Handle YAML lists (- item)
    if (!val) {
      // Multi-line list — collect following indented lines
      return;
    }
    // Strip quotes
    val = val.replace(/^["']|["']$/g, '');
    fm[key] = val;
  });

  // Second pass for YAML lists
  const listMatches = yamlText.matchAll(/^(\w[\w_-]*):\s*\n((?:\s+-[^\n]+\n?)+)/gm);
  for (const m of listMatches) {
    const key = m[1];
    const items = m[2].match(/-\s*(.+)/g)?.map(s => s.replace(/^-\s*/, '').trim()) || [];
    fm[key] = items;
  }

  return { fm, body };
}

// ── Parse a single .md note ───────────────────────────────────
function parseObsidianNote(filename, content) {
  const { fm, body } = parseFrontmatter(content);
  const baseName = filename.replace(/\.md$/, '');

  // Determine note type from frontmatter tags or fields
  const tags = (fm.tags || fm.tag || '').toString().toLowerCase();
  const obsidianType = (fm.type || '').toLowerCase(); // Obsidian data type (place, NPC, faction, shop…)
  const isExplicitLocation = ['place','location','city','town','village','settlement','dungeon','cave','ruin','ruins','wilderness','forest','port','harbour','harbor'].includes(obsidianType);
  const isExplicitNPC     = obsidianType === 'npc' || obsidianType === 'character';
  const isExplicitOther   = ['faction','shop'].includes(obsidianType); // skip these
  const hasLocationType   = fm.type && ['city','dungeon','wilderness','ruin','port','location','settlement','town','village'].includes(obsidianType);
  const isNPCByTag = tags.includes('npc') || tags.includes('character') || tags.includes('person');
  const isLocByTag = tags.includes('location') || tags.includes('place') || tags.includes('settlement');
  const hasRole = !!fm.role;
  // Only use hasLocationField as NPC signal when the note isn't explicitly a location
  const hasLocationField = !isExplicitLocation && !!(fm.location || fm.Location);

  let noteType = 'unknown';
  if (isExplicitOther) noteType = 'unknown'; // faction/shop — skip
  else if (isExplicitLocation) noteType = 'location';
  else if (isExplicitNPC || hasRole || isNPCByTag || hasLocationField) noteType = 'npc';
  else if (hasLocationType || isLocByTag || fm.shortDesc || fm.lore) noteType = 'location';
  else if (body.match(/^#{1,3} (NPCs?|Characters?|Inhabitants)/m)) noteType = 'location';
  else if (fm.name && !hasRole) noteType = 'location'; // default guess

  if (noteType === 'npc') {
    return parseNPCNote(baseName, fm, body);
  } else if (noteType === 'location') {
    return parseLocationNote(baseName, fm, body);
  }
  return { noteType: 'unknown', name: baseName, raw: { fm, body } };
}

// ── Parse location note ───────────────────────────────────────
function parseLocationNote(baseName, fm, body) {
  const name = fm.name || fm.title || baseName;
  const id   = (fm.id || name).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

  // Extract sections from markdown body
  const sections = extractMarkdownSections(body);

  // Lore: everything before the first heading, or a ## Description / ## About section
  const lore = sections['description'] || sections['about'] || sections['lore'] || sections['overview'] || sections['_intro'] || '';

  // Quest hooks from YAML list or ## Quests section
  let quests = [];
  if (Array.isArray(fm.quests)) {
    quests = fm.quests.map(q => typeof q === 'string' ? { title: q, desc: '' } : q);
  }
  const questSection = sections['quests'] || sections['quest hooks'] || sections['hooks'] || '';
  if (questSection) {
    questSection.split('\n').filter(l => l.trim().startsWith('-')).forEach(line => {
      const text = line.replace(/^-\s*/, '').trim();
      if (text) quests.push({ title: text, desc: '' });
    });
  }

  // Connected locations from YAML or body wiki links
  let connected = [];
  if (fm.connected) connected = Array.isArray(fm.connected) ? fm.connected : fm.connected.split(',').map(s => s.trim());
  const wikiLinks = [...body.matchAll(/\[\[([^\]|#]+?)(?:\|[^\]]*)?\]\]/g)].map(m => m[1].trim().toLowerCase().replace(/[^a-z0-9]+/g, '-'));
  connected = [...new Set([...connected, ...wikiLinks])].filter(Boolean);

  // DM notes from ## DM Notes / ## Secrets section
  const dmNotes = [
    sections['dm notes'] || sections['dm'] || sections['secrets'] || sections['secret'] || '',
    fm.secret || fm.secrets || '',
    fm.statblock || ''
  ].filter(Boolean).join('\n\n').trim();

  // Map type — prefer explicit map_type field, fall back to type field
  const rawType = (fm.map_type || fm.mapType || fm.type || '').toLowerCase();
  const typeMap = { city:'city', town:'city', village:'city', settlement:'city', dungeon:'dungeon', cave:'dungeon', ruins:'ruin', ruin:'ruin', wilderness:'wilderness', forest:'wilderness', port:'port', harbour:'port', harbor:'port' };
  const locType = typeMap[rawType] || 'default';

  return {
    noteType: 'location',
    name,
    id,
    type:      locType,
    shortDesc: fm.shortDesc || fm.description || fm.desc || fm.summary || '',
    lore:      lore.trim(),
    mapImage:  fm.mapImage || fm.map || '',
    connected,
    quests,
    visible:   fm.visible !== 'false' && fm.visible !== false,
    x:         parseFloat(fm.x) || null,
    y:         parseFloat(fm.y) || null,
    dmNotes,
    npcs:      [],  // filled in later from NPC files
  };
}

// ── Parse NPC note ────────────────────────────────────────────
function parseNPCNote(baseName, fm, body) {
  const name = fm.name || fm.title || baseName;

  // Location link: frontmatter field OR wiki link in body
  let locationRef = fm.location || fm.Location || fm.place || '';
  if (!locationRef) {
    const wikiMatch = body.match(/\[\[([^\]|#]+?)(?:\|[^\]]*)?\]\]/);
    if (wikiMatch) locationRef = wikiMatch[1].trim();
  }
  const locationId = locationRef ? locationRef.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') : '';

  // Description: frontmatter desc or body intro
  const { _intro } = extractMarkdownSections(body);
  const desc = fm.description || fm.desc || fm.bio || _intro || '';

  // DM notes: statblock + secrets
  const dmParts = [fm.statblock, fm.secrets, fm.secret, fm.notes].filter(Boolean);
  const dmNotes = dmParts.join('\n\n').trim();

  return {
    noteType:   'npc',
    name,
    role:       fm.role || fm.title || fm.occupation || '',
    desc:       desc.trim(),
    faction:    fm.faction || fm.affiliation || '',
    locationId,
    dmNotes,
  };
}

// ── Extract ## sections from markdown body ────────────────────
function extractMarkdownSections(body) {
  const sections = {};
  const lines = body.split('\n');
  let currentKey = '_intro';
  let buffer = [];

  lines.forEach(line => {
    const headingMatch = line.match(/^#{1,4}\s+(.+)/);
    if (headingMatch) {
      sections[currentKey] = buffer.join('\n').trim();
      currentKey = headingMatch[1].trim().toLowerCase();
      buffer = [];
    } else {
      buffer.push(line);
    }
  });
  sections[currentKey] = buffer.join('\n').trim();
  return sections;
}

// ── Step 2: build preview ─────────────────────────────────────
function importStep2() {
  // Stitch NPCs into their locations
  const locationNotes = importFiles.filter(f => f.parsed.noteType === 'location').map(f => ({ ...f.parsed }));
  const npcNotes      = importFiles.filter(f => f.parsed.noteType === 'npc').map(f => f.parsed);

  // Build a lookup of location id → location
  const locById   = {};
  const locByName = {};
  locationNotes.forEach(loc => {
    locById[loc.id] = loc;
    locByName[loc.name.toLowerCase()] = loc;
  });

  // Also check existing map locations for NPC assignment
  data.locations.forEach(loc => {
    if (!locById[loc.id]) locById[loc.id] = loc;
    if (!locByName[loc.name.toLowerCase()]) locByName[loc.name.toLowerCase()] = loc;
  });

  npcNotes.forEach(npc => {
    const targetLoc = locById[npc.locationId] || locByName[npc.locationId] || locByName[npc.name.toLowerCase().replace(/[^a-z0-9]+/g,'-')];
    if (targetLoc) {
      if (!targetLoc.npcs) targetLoc.npcs = [];
      const npcEntry = { name: npc.name, role: npc.role, desc: npc.desc + (npc.faction ? ` (${npc.faction})` : '') };
      if (!targetLoc.npcs.find(n => n.name === npc.name)) {
        targetLoc.npcs.push(npcEntry);
      }
      // DM notes from NPC go into location DM notes
      if (npc.dmNotes) {
        targetLoc.dmNotes = (targetLoc.dmNotes ? targetLoc.dmNotes + '\n\n' : '') + `## ${npc.name}\n${npc.dmNotes}`;
      }
    }
  });

  importParsed = locationNotes;
  conflictChoices = {};

  // Build preview
  const previewList = document.getElementById('import-preview-list');
  const previewSummary = document.getElementById('import-preview-summary');
  previewList.innerHTML = '';

  const conflicts   = importParsed.filter(loc => data.locations.find(e => e.id === loc.id));
  const newLocs     = importParsed.filter(loc => !data.locations.find(e => e.id === loc.id));
  const unlinkedNPCs = npcNotes.filter(npc => !locById[npc.locationId] && !locByName[(npc.locationId||'').toLowerCase()]);

  previewSummary.innerHTML = `Importing <strong>${importParsed.length}</strong> location${importParsed.length !== 1 ? 's' : ''} (<strong>${newLocs.length}</strong> new, <strong>${conflicts.length}</strong> conflict${conflicts.length !== 1 ? 's' : ''}) with <strong>${npcNotes.length}</strong> NPC${npcNotes.length !== 1 ? 's' : ''}.${unlinkedNPCs.length ? ` <span style="color:#c87800">${unlinkedNPCs.length} NPC${unlinkedNPCs.length !== 1 ? 's' : ''} could not be matched to a location.</span>` : ''}`;

  // Conflicts first
  conflicts.forEach(loc => {
    conflictChoices[loc.id] = 'merge'; // default
    const existing = data.locations.find(e => e.id === loc.id);
    const card = document.createElement('div');
    card.className = 'conflict-row';
    card.innerHTML = `
      <div class="conflict-row-title">⚠ Conflict — "${loc.name}" already exists on the map</div>
      <div style="font-size:0.78rem;color:var(--ink-faint);margin-bottom:6px">
        Existing: ${existing.npcs?.length||0} NPCs, ${existing.quests?.length||0} quests &nbsp;|&nbsp;
        Importing: ${loc.npcs?.length||0} NPCs, ${loc.quests?.length||0} quests
      </div>
      <div class="conflict-opts">
        <button class="conflict-opt merge selected" id="co-merge-${loc.id}" onclick="setConflict('${loc.id}','merge')">Merge — add new data, keep existing</button>
        <button class="conflict-opt replace" id="co-replace-${loc.id}" onclick="setConflict('${loc.id}','replace')">Replace — overwrite completely</button>
        <button class="conflict-opt skip" id="co-skip-${loc.id}" onclick="setConflict('${loc.id}','skip')">Skip — leave unchanged</button>
      </div>
    `;
    previewList.appendChild(card);
  });

  // New locations
  if (newLocs.length) {
    const header = document.createElement('div');
    header.className = 'import-preview-title';
    header.textContent = `NEW LOCATIONS (${newLocs.length})`;
    previewList.appendChild(header);
  }
  newLocs.forEach(loc => {
    const typeColor = TYPE_COLORS[loc.type] || TYPE_COLORS.default;
    const card = document.createElement('div');
    card.className = 'import-loc-card';
    card.innerHTML = `
      <div class="import-loc-header">
        <span class="import-loc-name">${TYPE_ICONS[loc.type]||'📍'} ${loc.name}</span>
        <span class="import-loc-badge" style="background:${typeColor}22;color:${typeColor};border:1px solid ${typeColor}44">${loc.type}</span>
      </div>
      <div class="import-loc-details">
        ${loc.shortDesc ? `<span>${loc.shortDesc.slice(0,80)}${loc.shortDesc.length>80?'…':''}</span>` : ''}
        ${loc.npcs?.length ? `<span>👤 ${loc.npcs.length} NPC${loc.npcs.length!==1?'s':''}</span>` : ''}
        ${loc.quests?.length ? `<span>✦ ${loc.quests.length} quest${loc.quests.length!==1?'s':''}</span>` : ''}
        ${loc.lore ? `<span>📜 Lore</span>` : ''}
        ${loc.dmNotes ? `<span>🔒 DM notes</span>` : ''}
      </div>
    `;
    previewList.appendChild(card);
  });

  // Unlinked NPCs warning
  if (unlinkedNPCs.length) {
    const warn = document.createElement('div');
    warn.style.cssText = 'background:rgba(200,120,0,0.08);border:1px solid rgba(200,120,0,0.3);border-radius:4px;padding:8px 10px;margin-top:8px;font-size:0.78rem;color:#c87800;font-family:Cinzel,serif;font-size:0.65rem;letter-spacing:0.06em';
    warn.innerHTML = `⚠ UNMATCHED NPCs — no location found:<br><span style="font-family:inherit;color:var(--ink-faint);font-size:0.75rem">${unlinkedNPCs.map(n=>n.name).join(', ')}</span>`;
    previewList.appendChild(warn);
  }

  document.getElementById('import-step-1').style.display = 'none';
  document.getElementById('import-step-2').style.display = 'block';
  document.getElementById('import-next-btn').style.display = 'none';
  document.getElementById('import-confirm-btn').style.display = '';
}

function setConflict(locId, choice) {
  conflictChoices[locId] = choice;
  ['merge','replace','skip'].forEach(opt => {
    const btn = document.getElementById(`co-${opt}-${locId}`);
    if (btn) btn.classList.toggle('selected', opt === choice);
  });
}

// ── Commit the import ─────────────────────────────────────────
function confirmImport() {
  let added = 0, merged = 0, replaced = 0, skipped = 0;

  importParsed.forEach(loc => {
    const existingIdx = data.locations.findIndex(e => e.id === loc.id);

    if (existingIdx >= 0) {
      const choice = conflictChoices[loc.id] || 'merge';
      if (choice === 'skip') { skipped++; return; }

      if (choice === 'replace') {
        // Keep map position if already placed
        const existing = data.locations[existingIdx];
        data.locations[existingIdx] = {
          ...loc,
          x: loc.x ?? existing.x,
          y: loc.y ?? existing.y,
          visible: existing.visible,
        };
        replaced++;
      } else { // merge
        const existing = data.locations[existingIdx];
        // Merge NPCs (no duplicates by name)
        const existingNPCNames = new Set((existing.npcs||[]).map(n => n.name));
        const newNPCs = (loc.npcs||[]).filter(n => !existingNPCNames.has(n.name));
        // Merge quests (no duplicates by title)
        const existingQuestTitles = new Set((existing.quests||[]).map(q => q.title));
        const newQuests = (loc.quests||[]).filter(q => !existingQuestTitles.has(q.title));
        data.locations[existingIdx] = {
          ...existing,
          shortDesc: loc.shortDesc || existing.shortDesc,
          lore:      loc.lore      || existing.lore,
          npcs:      [...(existing.npcs||[]), ...newNPCs],
          quests:    [...(existing.quests||[]), ...newQuests],
          dmNotes:   [existing.dmNotes, loc.dmNotes].filter(Boolean).join('\n\n'),
          connected: [...new Set([...(existing.connected||[]), ...(loc.connected||[])])],
        };
        merged++;
      }
    } else {
      // New location — place at a sensible random position if not specified
      data.locations.push({
        ...loc,
        x:       loc.x ?? Math.round(10 + Math.random() * 80),
        y:       loc.y ?? Math.round(10 + Math.random() * 80),
        npcs:    loc.npcs   || [],
        quests:  loc.quests || [],
        visible: loc.visible !== false,
      });
      added++;
    }
  });

  saveAll();
  renderLocList();
  buildMap();
  closeImport();

  const parts = [];
  if (added)    parts.push(`${added} added`);
  if (merged)   parts.push(`${merged} merged`);
  if (replaced) parts.push(`${replaced} replaced`);
  if (skipped)  parts.push(`${skipped} skipped`);
  setSyncStatus('ok', `✦ Import done — ${parts.join(', ')}`);
  setTimeout(() => setSyncStatus('', ''), 5000);
}
