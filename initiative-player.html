<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initiative — Player View</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0e0c06;
  --surface: #1a1608;
  --surface2: #221d0a;
  --border: #332a0e;
  --border-light: #443a18;
  --gold: #b8860b;
  --gold-light: #d4a820;
  --gold-faint: #5a4208;
  --ink: #e8dfc0;
  --ink-dim: #a09070;
  --ink-faint: #6a5a40;
  --red: #c0392b;
  --red-bg: #2a0f0d;
  --green: #2d6a3f;
  --green-light: #4a9a60;
  --pc-accent: #2e5a8a;
  --enemy-accent: #8a2e2e;
  --active-glow: rgba(184,134,11,0.3);
  --radius: 4px;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Crimson Text', Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem;
}

/* Header */
.header {
  width: 100%;
  max-width: 640px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.2rem;
  padding-bottom: 0.8rem;
  border-bottom: 1px solid var(--border);
}
.header h1 { font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 0.1em; color: var(--gold); }
.round-badge {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: var(--ink-dim);
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 4px 12px;
}
.round-badge span { color: var(--gold-light); font-size: 1rem; margin-left: 4px; }

/* Connection */
.conn-bar {
  width: 100%;
  max-width: 640px;
  font-family: 'Cinzel', serif;
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-align: center;
  margin-bottom: 0.8rem;
  padding: 4px;
  border-radius: var(--radius);
}
.conn-bar.live    { color: #4a9a60; background: rgba(74,154,96,0.1); border: 1px solid rgba(74,154,96,0.3); }
.conn-bar.waiting { color: var(--ink-faint); background: var(--surface); border: 1px solid var(--border); }
.conn-bar.error   { color: #e88; background: var(--red-bg); border: 1px solid var(--red); }

/* Combatant list */
.list { width: 100%; max-width: 640px; }

.row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  transition: border-color 0.3s, box-shadow 0.3s;
  overflow: hidden;
}
.row.is-pc    { border-left: 3px solid var(--pc-accent); }
.row.is-enemy { border-left: 3px solid var(--enemy-accent); }
.row.is-active {
  border-color: var(--gold);
  box-shadow: 0 0 16px var(--active-glow);
  background: var(--surface2);
}
.row.is-dead { opacity: 0.38; }

.row-main {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
}

.init-num {
  font-family: 'Cinzel', serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--gold-light);
  text-align: center;
}
.row.is-active .init-num { color: var(--gold); }

.name-block {}
.name-text {
  font-family: 'Cinzel', serif;
  font-size: 0.92rem;
  letter-spacing: 0.03em;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 6px;
}
.active-marker { color: var(--gold); font-size: 0.85rem; animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.type-pip { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.type-pip.pc    { background: var(--pc-accent); }
.type-pip.enemy { background: var(--enemy-accent); }

.conds {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 4px;
}
.cond-tag {
  font-family: 'Cinzel', serif;
  font-size: 0.58rem;
  letter-spacing: 0.05em;
  padding: 1px 6px;
  border-radius: 8px;
  background: rgba(200,120,0,0.15);
  color: #d4a820;
  border: 1px solid rgba(200,120,0,0.35);
}

/* HP section */
.hp-block { text-align: right; min-width: 120px; }
.hp-label { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--ink-faint); margin-bottom: 3px; }
.hp-bar-wrap { width: 100%; height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
.hp-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease, background 0.5s ease; }
.hp-num { font-size: 0.78rem; color: var(--ink-dim); margin-top: 2px; }

/* AC badge */
.ac-chip {
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  color: var(--ink-dim);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 2px 8px;
  text-align: center;
  margin-left: 8px;
  white-space: nowrap;
}
.ac-chip small { display: block; font-size: 0.55rem; color: var(--ink-faint); }

/* Whose turn banner */
.active-banner {
  width: 100%;
  max-width: 640px;
  background: linear-gradient(90deg, var(--gold-faint), transparent);
  border: 1px solid var(--gold);
  border-radius: var(--radius);
  padding: 8px 16px;
  margin-bottom: 1rem;
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  color: var(--gold-light);
  display: none;
}
.active-banner.show { display: block; }

/* Empty */
.empty { color: var(--ink-faint); font-style: italic; text-align: center; padding: 3rem 1rem; width: 100%; max-width: 640px; }
</style>
</head>
<body>

<div class="header">
  <h1>⚔ Initiative Order</h1>
  <div class="round-badge">ROUND <span id="round-num">—</span></div>
</div>

<div class="conn-bar waiting" id="conn-bar">⟳ Connecting to DM…</div>
<div class="active-banner" id="active-banner"></div>
<div class="list" id="list"></div>
<div class="empty" id="empty-state">Waiting for the DM to start combat…</div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════
const WORKER_URL = 'https://dnd-perk-webhook.jacobgiff.workers.dev/';
const POLL_MS    = 2500; // poll every 2.5 seconds

let lastState = null;
let pollTimer = null;
let failCount = 0;

// ═══════════════════════════════════════════════════════
//  HP BAR COLOR
// ═══════════════════════════════════════════════════════
function hpColor(pct) {
  if (pct > 60) return '#2d6a3f';
  if (pct > 30) return '#c87800';
  return '#c0392b';
}

function hpLabel(pct, type, hp, maxHp) {
  if (type === 'pc' && hp !== null) return `${hp} / ${maxHp}`;
  if (pct >= 100) return 'Unharmed';
  if (pct >= 75)  return 'Lightly wounded';
  if (pct >= 50)  return 'Wounded';
  if (pct >= 25)  return 'Heavily wounded';
  if (pct > 0)    return 'Near death';
  return 'Unconscious';
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render(s) {
  document.getElementById('round-num').textContent = s.round;

  const list  = document.getElementById('list');
  const empty = document.getElementById('empty-state');
  const banner = document.getElementById('active-banner');

  if (!s.combatants || s.combatants.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    banner.classList.remove('show');
    return;
  }
  empty.style.display = 'none';

  const active = s.combatants[s.activeIndex];
  if (active) {
    banner.textContent = `▶ It is ${active.name}'s turn`;
    banner.classList.add('show');
  }

  list.innerHTML = '';
  s.combatants.forEach((c, idx) => {
    const isActive = idx === s.activeIndex;
    const row = document.createElement('div');
    row.className = `row is-${c.type}${isActive ? ' is-active' : ''}${c.dead ? ' is-dead' : ''}`;

    const condsHtml = c.conditions && c.conditions.length > 0
      ? `<div class="conds">${c.conditions.map(cond => `<span class="cond-tag">${cond}</span>`).join('')}</div>`
      : '';

    const hpPct = c.hpPct ?? 100;
    const isPC  = c.type === 'pc';

    row.innerHTML = `
      <div class="row-main">
        <div class="init-num">${c.init}</div>
        <div class="name-block">
          <div class="name-text">
            <span class="type-pip ${c.type}"></span>
            ${isActive ? '<span class="active-marker">▶</span>' : ''}
            ${c.name}
          </div>
          ${condsHtml}
        </div>
        <div style="display:flex;align-items:center">
          <div class="hp-block">
            <div class="hp-label">${isPC ? 'HP' : 'CONDITION'}</div>
            <div class="hp-bar-wrap">
              <div class="hp-bar" style="width:${hpPct}%;background:${hpColor(hpPct)}"></div>
            </div>
            <div class="hp-num">${hpLabel(hpPct, c.type, c.hp, c.maxHp)}</div>
          </div>
          ${isPC ? `<div class="ac-chip"><small>AC</small>${c.ac}</div>` : ''}
        </div>
      </div>
    `;
    list.appendChild(row);
  });
}

// ═══════════════════════════════════════════════════════
//  POLL
// ═══════════════════════════════════════════════════════
async function poll() {
  try {
    const res = await fetch(WORKER_URL + '?type=initiative_state', { cache: 'no-store' });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    failCount = 0;
    const bar = document.getElementById('conn-bar');
    bar.className = 'conn-bar live';
    bar.textContent = '✦ Live — updates every few seconds';
    if (data && data.combatants) {
      lastState = data;
      render(data);
    }
  } catch {
    failCount++;
    const bar = document.getElementById('conn-bar');
    if (failCount > 3) {
      bar.className = 'conn-bar error';
      bar.textContent = '⚠ Connection lost — retrying…';
    }
  }
  pollTimer = setTimeout(poll, POLL_MS);
}

poll();
</script>
</body>
</html>
