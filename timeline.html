<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Spire — Chronicle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c10;--panel:#131c22;--panel-deep:#0d141a;--panel-light:#1c2730;
      --border:#2c4048;--border-light:#3e5862;
      --teal:#4a9595;--teal-bright:#7ec5c5;--teal-deep:#2a5454;--teal-faint:#1b3838;
      --ink:#dde3e5;--ink-light:#a3adb3;--ink-faint:#6c787f;
      --brass:#b88a5a;--rust:#a85d4a;
      --radius:4px;
    }
    body{
      background:var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(74,149,149,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(184,138,90,0.06) 0%, transparent 55%);
      min-height:100vh; color:var(--ink);
      font-family:'Crimson Text',Georgia,serif;
      padding:1.5rem 1rem 4rem;
    }

    .wrap{max-width:780px;margin:0 auto}

    /* Topbar */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:1rem;
      padding-bottom:1rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);
      flex-wrap:wrap;
    }
    .topbar h1{
      font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;
      letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);
    }
    .topbar h1 .accent{color:var(--teal-bright);font-weight:400}
    .topbar-meta{display:flex;align-items:center;gap:8px;font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint)}
    .topbar-meta .role{padding:2px 8px;border-radius:10px;border:1px solid;font-size:0.55rem}
    .role.dm        {color:var(--brass);      border-color:rgba(184,138,90,0.45); background:rgba(184,138,90,0.10)}
    .role.player    {color:var(--teal-bright);border-color:rgba(74,149,149,0.45); background:rgba(74,149,149,0.12)}
    .role.anonymous {color:var(--ink-faint);  border-color:var(--border);         background:rgba(108,120,127,0.12)}
    .home-link{font-family:'Cinzel',serif;font-size:0.66rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-light);text-decoration:none;padding:6px 12px;border:1px solid var(--border-light);border-radius:var(--radius);transition:all 0.15s}
    .home-link:hover{border-color:var(--teal);color:var(--teal-bright)}

    /* Filter bar */
    .filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;align-items:center}
    .filters input,.filters select{
      background:var(--panel-deep);border:1px solid var(--border);border-radius:2px;
      color:var(--ink);font-family:'Crimson Text',serif;font-size:0.9rem;padding:6px 9px;outline:none;
    }
    .filters input{flex:1;min-width:160px}
    .filters input:focus,.filters select:focus{border-color:var(--teal)}

    /* Empty / loading */
    .state{text-align:center;padding:3rem 1rem;color:var(--ink-faint);font-style:italic;font-size:1rem}
    .state.error{color:var(--rust)}

    /* Timeline entries */
    .entry{
      background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
      padding:1.1rem 1.25rem;margin-bottom:1rem;border-left:3px solid var(--border-light);
      box-shadow:0 2px 8px rgba(0,0,0,0.25);
    }
    .entry.kind-session   {border-left-color:#4a90d4}
    .entry.kind-event     {border-left-color:#c87800}
    .entry.kind-milestone {border-left-color:var(--teal-bright)}
    .entry.kind-planned   {border-left-color:var(--brass);background:linear-gradient(90deg,rgba(184,138,90,0.06),var(--panel))}

    .entry-head{display:flex;align-items:baseline;flex-wrap:wrap;gap:10px;margin-bottom:0.5rem}
    .entry-kind{
      font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;
      padding:2px 8px;border-radius:10px;border:1px solid;
    }
    .entry-kind.session   {color:#8fbceb;border-color:#4a80c0}
    .entry-kind.event     {color:#f0b076;border-color:#c87800}
    .entry-kind.milestone {color:var(--teal-bright);border-color:var(--teal)}
    .entry-kind.planned   {color:var(--brass);border-color:rgba(184,138,90,0.55)}

    .entry-title{
      font-family:'Cinzel',serif;font-size:1.05rem;letter-spacing:0.05em;color:var(--ink);
      flex:1;line-height:1.3;
    }
    .entry-date{
      font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.1em;color:var(--teal);
    }
    .entry-body{
      font-size:0.98rem;line-height:1.65;color:var(--ink-light);
      white-space:pre-wrap;margin-top:0.4rem;
    }
    .entry-dmnotes{
      background:rgba(184,138,90,0.08);border:1px solid rgba(184,138,90,0.4);border-radius:2px;
      padding:0.5rem 0.7rem;margin-top:0.7rem;font-size:0.9rem;line-height:1.5;color:var(--brass);
    }
    .entry-dmnotes-label{
      font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.16em;
      text-transform:uppercase;margin-bottom:0.35rem;opacity:0.85;
    }

    .entry-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:0.8rem;font-size:0.78rem}
    .entry-chip{
      background:var(--panel-light);border:1px solid var(--border-light);border-radius:10px;
      padding:2px 10px;color:var(--ink-light);cursor:pointer;text-decoration:none;
      transition:all 0.15s;font-family:'Cinzel',serif;font-size:0.66rem;letter-spacing:0.06em;
    }
    .entry-chip:hover{border-color:var(--teal);color:var(--teal-bright)}
    .entry-chip.loc::before  {content:'📍 '}
    .entry-chip.char::before {content:'★ '}
    .entry-chip.npc::before  {content:'☉ '}

    /* Combats + loot on a session entry */
    .entry-combat{background:var(--panel-deep);border:1px solid var(--border);border-left:3px solid #4a90d4;border-radius:var(--radius);padding:0.6rem 0.8rem;margin-top:0.7rem}
    .entry-combat-head{font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.04em;color:var(--ink);margin-bottom:0.35rem}
    .entry-combat-head .outcome{color:var(--teal-bright)}
    .entry-combat-line{font-size:0.86rem;color:var(--ink-light);line-height:1.5}
    .entry-combat-line .lbl{color:var(--ink-faint)}
    .entry-combat-detail{margin-top:0.5rem}
    .entry-combat-detail summary{cursor:pointer;font-family:'Cinzel',serif;font-size:0.66rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--brass)}
    .entry-combat-detail pre{margin-top:0.5rem;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:0.7rem;font-size:0.78rem;line-height:1.45;color:var(--ink-light);white-space:pre-wrap;overflow-x:auto;font-family:'SFMono-Regular',ui-monospace,Menlo,monospace}
    .entry-loot{margin-top:0.7rem}
    .entry-loot-title{font-family:'Cinzel',serif;font-size:0.66rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--brass);margin-bottom:0.4rem}
    .loot-table{width:100%;border-collapse:collapse;font-size:0.88rem}
    .loot-table th{text-align:left;font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-faint);padding:3px 8px;border-bottom:1px solid var(--border)}
    .loot-table td{padding:4px 8px;border-bottom:1px solid var(--border);color:var(--ink-light)}
    .loot-table td.qty{width:48px;color:var(--teal-bright);font-family:'Cinzel',serif}
    .loot-table td.who{width:130px;color:var(--ink-faint)}

    /* DM-only divider before planned entries */
    .planned-divider{
      display:flex;align-items:center;gap:10px;margin:2rem 0 1rem;
      font-family:'Cinzel',serif;font-size:0.66rem;letter-spacing:0.2em;
      text-transform:uppercase;color:var(--brass);
    }
    .planned-divider::before,.planned-divider::after{content:'';flex:1;height:1px;background:rgba(184,138,90,0.4)}

    /* Footer */
    .footer{margin-top:2rem;text-align:center;padding-top:1.5rem;border-top:1px solid var(--border)}
    .footer-text{font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-faint)}
  </style>
</head>
<body>
  <div class="wrap">

    <div class="topbar">
      <h1>The <span class="accent">Chronicle</span></h1>
      <div class="topbar-meta">
        <span id="role-line">— loading —</span>
        <a href="home.html" class="home-link">⌂ Home</a>
      </div>
    </div>

    <div class="filters">
      <input type="text" id="search" placeholder="Search title, body, date…" oninput="render()">
      <select id="kind-filter" onchange="render()">
        <option value="">All kinds</option>
        <option value="session">Sessions</option>
        <option value="event">Events</option>
        <option value="milestone">Milestones</option>
        <option value="planned" id="kind-planned-opt">Planned (DM)</option>
      </select>
      <select id="sort" onchange="render()">
        <option value="desc">Newest first</option>
        <option value="asc">Oldest first</option>
      </select>
    </div>

    <div id="state" class="state">Loading the chronicle…</div>
    <div id="entries"></div>

    <div class="footer">
      <p class="footer-text">The Spire · Chronicle</p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const WORKER_URL = (window.Auth && window.Auth.WORKER_URL) || 'https://dnd-perk-webhook.jacobgiff.workers.dev/';

    let entries = [];
    let isDM    = false;

    function esc(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    async function bootstrap() {
      const ident = Auth.identity();
      const roleEl = document.getElementById('role-line');
      const kindPlannedOpt = document.getElementById('kind-planned-opt');
      const stateEl = document.getElementById('state');
      isDM = (ident.role === 'dm');

      roleEl.innerHTML = `Viewing as <strong style="color:var(--ink)">${esc(ident.display||'Visitor')}</strong> <span class="role ${ident.role}">${ident.role==='dm'?'DM':ident.role==='player'?'Player':'Visitor'}</span>`;
      // Non-DM viewers don't see planned entries at all (filtered server-side) — hide the filter option for them
      if (!isDM) kindPlannedOpt.style.display = 'none';

      try {
        if (isDM) {
          const r = await fetch(WORKER_URL + '?type=timeline_dm', { cache:'no-store', headers: Auth.dmHeaders() });
          if (r.status === 401) { stateEl.textContent = 'Your DM session expired — sign in again on the home page.'; stateEl.classList.add('error'); return; }
          if (!r.ok) throw new Error('HTTP '+r.status);
          entries = await r.json();
        } else if (ident.role === 'player') {
          const creds = Auth.playerCreds();
          const u = `${WORKER_URL}?type=timeline_view&characterId=${encodeURIComponent(creds.characterId)}&code=${encodeURIComponent(creds.code)}`;
          const r = await fetch(u, { cache:'no-store' });
          if (!r.ok) throw new Error('HTTP '+r.status);
          entries = await r.json();
        } else {
          const r = await fetch(WORKER_URL + '?type=timeline', { cache:'no-store' });
          if (!r.ok) throw new Error('HTTP '+r.status);
          entries = await r.json();
        }
        if (!Array.isArray(entries)) entries = [];
      } catch (e) {
        stateEl.textContent = 'Could not reach the chronicle.';
        stateEl.classList.add('error');
        return;
      }
      // Fetch character/location/NPC names for linked-chip labels (best effort,
      // anonymous gets only character list).
      try {
        const [cl] = await Promise.all([ Auth.characterList() ]);
        nameMaps.characters = Object.fromEntries((cl||[]).map(c => [c.id, c.name]));
      } catch {}
      try {
        const r = await fetch(WORKER_URL + '?type=map_data', { cache:'no-store' });
        if (r.ok) {
          const d = await r.json();
          nameMaps.locations = Object.fromEntries((d?.locations||[]).map(l => [l.id, l.name]));
        }
      } catch {}
      // NPCs need creds; anonymous gets nothing — chip will just show the id.
      try {
        if (ident.role === 'player') {
          const creds = Auth.playerCreds();
          const r = await fetch(`${WORKER_URL}?type=npc_roster&characterId=${encodeURIComponent(creds.characterId)}&code=${encodeURIComponent(creds.code)}`, { cache:'no-store' });
          if (r.ok) {
            const arr = await r.json();
            nameMaps.npcs = Object.fromEntries((arr||[]).map(n => [n.id, n.name]));
          }
        } else if (isDM) {
          const r = await fetch(WORKER_URL + '?type=npcs', { cache:'no-store', headers: Auth.dmHeaders() });
          if (r.ok) {
            const arr = await r.json();
            nameMaps.npcs = Object.fromEntries((arr||[]).map(n => [n.id, n.name]));
          }
        }
      } catch {}

      render();
    }

    const nameMaps = { locations:{}, characters:{}, npcs:{} };

    function sortKey(e) { return (e.dateSort || '') + '~' + (e.id||''); }

    function render() {
      const state = document.getElementById('state');
      const list  = document.getElementById('entries');
      const query = (document.getElementById('search').value || '').trim().toLowerCase();
      const kindF = document.getElementById('kind-filter').value;
      const sort  = document.getElementById('sort').value;

      let filtered = entries.filter(e => {
        if (kindF && e.kind !== kindF) return false;
        if (!query) return true;
        return (e.title||'').toLowerCase().includes(query)
            || (e.body||'').toLowerCase().includes(query)
            || (e.dateInGame||'').toLowerCase().includes(query);
      });
      filtered.sort((a,b) => sort === 'asc'
        ? sortKey(a).localeCompare(sortKey(b))
        : sortKey(b).localeCompare(sortKey(a)));

      if (filtered.length === 0) {
        state.style.display = '';
        state.classList.remove('error');
        state.textContent = entries.length === 0
          ? 'The chronicle is empty.'
          : 'No entries match those filters.';
        list.innerHTML = '';
        return;
      }
      state.style.display = 'none';

      // For DM viewers, render planned entries in a separate bottom block (visually
      // distinct), unless they explicitly filtered to a single kind.
      const showPlannedDivider = isDM && !kindF;
      const past    = showPlannedDivider ? filtered.filter(e => e.kind !== 'planned') : filtered;
      const planned = showPlannedDivider ? filtered.filter(e => e.kind === 'planned') : [];

      const pastHtml    = past.map(renderEntry).join('');
      const plannedHtml = planned.length
        ? `<div class="planned-divider">Planned</div>${planned.map(renderEntry).join('')}`
        : '';
      list.innerHTML = pastHtml + plannedHtml;
    }

    function renderEntry(e) {
      const kind = e.kind || 'event';
      const date = e.dateInGame || e.dateSort || '';
      const locChips  = (e.locationIds  || []).map(id => `<a class="entry-chip loc"  href="map.html#${esc(id)}">${esc(nameMaps.locations[id]  || id)}</a>`).join('');
      const charChips = (e.characterIds || []).map(id => `<span class="entry-chip char">${esc(nameMaps.characters[id] || id)}</span>`).join('');
      const npcChips  = (e.npcIds       || []).map(id => `<span class="entry-chip npc">${esc(nameMaps.npcs[id]       || id)}</span>`).join('');
      const allChips = locChips + charChips + npcChips;
      return `
        <article class="entry kind-${esc(kind)}">
          <div class="entry-head">
            <span class="entry-kind ${esc(kind)}">${esc(kind)}</span>
            <span class="entry-title">${esc(e.title||'(Untitled)')}</span>
            ${date ? `<span class="entry-date">${esc(date)}</span>` : ''}
          </div>
          ${e.body ? `<div class="entry-body">${esc(e.body)}</div>` : ''}
          ${renderCombats(e.combats)}
          ${renderLoot(e.loot)}
          ${isDM && e.dmNotes ? `<div class="entry-dmnotes"><div class="entry-dmnotes-label">DM Notes</div>${esc(e.dmNotes)}</div>` : ''}
          ${allChips ? `<div class="entry-meta">${allChips}</div>` : ''}
        </article>
      `;
    }

    function renderCombats(combats) {
      if (!Array.isArray(combats) || combats.length === 0) return '';
      return combats.map(c => {
        const downed   = (c.pcsDowned||[]).map(esc).join(', ');
        const defeated = (c.enemiesDefeated||[]).map(esc).join(', ');
        return `
          <div class="entry-combat">
            <div class="entry-combat-head">⚔ ${esc(c.title||'Combat')} — <span class="outcome">${esc(c.outcome||'')}</span></div>
            <div class="entry-combat-line">
              ${c.rounds ? `<span class="lbl">Rounds:</span> ${esc(String(c.rounds))} ` : ''}
              ${c.location ? `&nbsp;·&nbsp; <span class="lbl">Where:</span> ${esc(c.location)}` : ''}
            </div>
            ${defeated ? `<div class="entry-combat-line"><span class="lbl">Defeated:</span> ${defeated}</div>` : ''}
            ${downed   ? `<div class="entry-combat-line"><span class="lbl">Downed:</span> ${downed}</div>` : ''}
            ${isDM && c.dmDetail ? `<details class="entry-combat-detail"><summary>Full combat log (DM only)</summary><pre>${esc(c.dmDetail)}</pre></details>` : ''}
          </div>
        `;
      }).join('');
    }

    function renderLoot(loot) {
      if (!Array.isArray(loot) || loot.length === 0) return '';
      const rows = loot.map(l => `
        <tr>
          <td>${esc(l.item||'')}</td>
          <td class="qty">${esc(String(l.qty||'1'))}</td>
          <td class="who">${esc(l.recipient||'Party')}</td>
        </tr>
      `).join('');
      return `
        <div class="entry-loot">
          <div class="entry-loot-title">⬥ Loot</div>
          <table class="loot-table">
            <thead><tr><th>Item</th><th>Qty</th><th>Who</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;
    }

    bootstrap();
  </script>
</body>
</html>
